<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed - CineBook</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <a href="movies.html" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
      </svg>
      <span>CineBook</span>
    </a>

    <div class="navbar-nav">
      <a href="movies.html" class="nav-link">Movies</a>
      <a href="dashboard.html" class="nav-link">My Bookings</a>
    </div>

    <div class="navbar-right">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg class="sun-icon" viewBox="0 0 24 24">
          <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" style="display: none;">
          <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
      </button>

      <div class="profile-container">
        <button class="profile-btn" id="profileBtn">
          <svg viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
        </button>
        <div class="profile-dropdown" id="profileDropdown">
          <a href="dashboard.html" class="dropdown-item">
            <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            <span>Dashboard</span>
          </a>
          <a href="dashboard.html" class="dropdown-item">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            <span>My Bookings</span>
          </a>
          <div class="dropdown-divider"></div>
          <a href="index.html" class="dropdown-item" id="logoutBtn">
            <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            <span>Logout</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Ticket Page -->
  <main class="ticket-page">
    <div class="ticket-container">
      <div class="ticket-success">
        <div class="success-icon">
          <svg viewBox="0 0 24 24">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </div>
        <h2>Booking Confirmed!</h2>
        <p>Your tickets have been booked successfully</p>
      </div>

      <div class="ticket">
        <div class="ticket-header">
          <h3>CineBook</h3>
          <p>Movie Ticket</p>
        </div>
        <div class="ticket-body">
          <div class="ticket-info">
            <div class="ticket-info-item">
              <div class="ticket-info-label">Movie</div>
              <div class="ticket-info-value" id="ticketMovie">-</div>
            </div>
            <div class="ticket-info-item">
              <div class="ticket-info-label">Date</div>
              <div class="ticket-info-value" id="ticketDate">-</div>
            </div>
            <div class="ticket-info-item">
              <div class="ticket-info-label">Time</div>
              <div class="ticket-info-value" id="ticketTime">-</div>
            </div>
            <div class="ticket-info-item">
              <div class="ticket-info-label">Theater</div>
              <div class="ticket-info-value" id="ticketTheater">-</div>
            </div>
          </div>

          <div class="ticket-seats">
            <div class="ticket-seats-label">Seats</div>
            <div class="ticket-seats-value" id="ticketSeats">-</div>
          </div>

          <!-- QR Code Section -->
          <div class="ticket-qr">
            <div class="ticket-qr-label">Scan for Entry</div>
            <div class="ticket-qr-code">
              <svg viewBox="0 0 100 100" fill="#1a1a2e">
                <rect x="10" y="10" width="25" height="25" fill="#1a1a2e"/>
                <rect x="65" y="10" width="25" height="25" fill="#1a1a2e"/>
                <rect x="10" y="65" width="25" height="25" fill="#1a1a2e"/>
                <rect x="15" y="15" width="15" height="15" fill="white"/>
                <rect x="70" y="15" width="15" height="15" fill="white"/>
                <rect x="15" y="70" width="15" height="15" fill="white"/>
                <rect x="40" y="10" width="5" height="5" fill="#1a1a2e"/>
                <rect x="50" y="10" width="5" height="5" fill="#1a1a2e"/>
                <rect x="40" y="20" width="5" height="5" fill="#1a1a2e"/>
                <rect x="45" y="25" width="5" height="5" fill="#1a1a2e"/>
                <rect x="40" y="40" width="20" height="20" fill="#1a1a2e"/>
                <rect x="45" y="45" width="10" height="10" fill="white"/>
                <rect x="65" y="40" width="5" height="5" fill="#1a1a2e"/>
                <rect x="75" y="45" width="5" height="5" fill="#1a1a2e"/>
                <rect x="65" y="55" width="5" height="5" fill="#1a1a2e"/>
                <rect x="70" y="60" width="5" height="5" fill="#1a1a2e"/>
                <rect x="80" y="65" width="10" height="10" fill="#1a1a2e"/>
                <rect x="65" y="80" width="5" height="5" fill="#1a1a2e"/>
                <rect x="75" y="75" width="5" height="5" fill="#1a1a2e"/>
                <rect x="85" y="85" width="5" height="5" fill="#1a1a2e"/>
              </svg>
            </div>
            <div class="ticket-qr-hint">Present this at the entrance</div>
          </div>

          <div class="ticket-id">
            <div class="ticket-id-label">Booking ID</div>
            <div class="ticket-id-value" id="ticketId">-</div>
          </div>
        </div>
      </div>

      <div class="ticket-actions">
        <a href="dashboard.html" class="btn btn-secondary">View My Bookings</a>
        <a href="movies.html" class="btn btn-primary">Book More Movies</a>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
