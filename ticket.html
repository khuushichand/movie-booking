<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed - CineBook</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="global-video-bg">
    <video autoplay muted loop playsinline id="themeVideo">
      <source src="images/light.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
  </div>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="movies.html" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z" />
      </svg>
      <span>CineBook</span>
    </a>

    <div class="navbar-nav">
      <a href="movies.html" class="nav-link">Movies</a>
      <a href="dashboard.html" class="nav-link">My Bookings</a>
    </div>

    <div class="navbar-right">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg class="sun-icon" viewBox="0 0 24 24">
          <path
            d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z" />
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" style="display: none;">
          <path
            d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z" />
        </svg>
      </button>

      <div class="profile-container">
        <button class="profile-btn" id="profileBtn">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
          </svg>
        </button>
        <div class="profile-dropdown" id="profileDropdown">
          <a href="dashboard.html" class="dropdown-item">
            <svg viewBox="0 0 24 24">
              <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
            </svg>
            <span>Dashboard</span>
          </a>
          <a href="dashboard.html" class="dropdown-item">
            <svg viewBox="0 0 24 24">
              <path
                d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" />
            </svg>
            <span>My Bookings</span>
          </a>
          <div class="dropdown-divider"></div>
          <a href="index.html" class="dropdown-item" id="logoutBtn">
            <svg viewBox="0 0 24 24">
              <path
                d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
            </svg>
            <span>Logout</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Ticket Page -->
  <main class="ticket-page">
    <div class="ticket-container fade-in">
      <div class="ticket-success">
        <div class="success-icon pulse-animation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h2 style="margin-top: 1rem; font-size: 2rem;">Booking Confirmed!</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">We've successfully processed your payment.</p>
      </div>

      <div class="premium-ticket slide-up-animation">
        <!-- Top part of ticket -->
        <div class="ticket-top">
          <div class="ticket-brand">
            <svg viewBox="0 0 24 24" fill="currentColor" style="width: 24px; height: 24px; margin-right: 8px;">
              <path
                d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z" />
            </svg>
            CINEBOOK EXCLUSIVE
          </div>
          <h3 class="ticket-movie-title" id="ticketMovie">Loading...</h3>
          <div class="ticket-meta-grid">
            <div class="meta-item">
              <span class="meta-label">Date</span>
              <span class="meta-value" id="ticketDate">-</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Time</span>
              <span class="meta-value" id="ticketTime">-</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Theater</span>
              <span class="meta-value" id="ticketTheater">-</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Seats</span>
              <span class="meta-value" style="color: var(--accent-primary);" id="ticketSeats">-</span>
            </div>
          </div>
        </div>

        <!-- Perforated separator line -->
        <div class="ticket-separator">
          <div class="cutout-left"></div>
          <div class="dashed-line"></div>
          <div class="cutout-right"></div>
        </div>

        <!-- Bottom part of ticket -->
        <div class="ticket-bottom">
          <div class="payment-info">
            <span class="meta-label">Total Amount Paid</span>
            <span class="meta-value" style="font-size: 1.5rem;" id="ticketTotal">-</span>
          </div>
          <div class="barcode-section">
            <div class="barcode-bars"></div>
            <p class="ticket-id" id="ticketId">-</p>
          </div>
        </div>
      </div>

      <div class="ticket-actions slide-up-animation" style="animation-delay: 0.2s;">
        <a href="dashboard.html" class="btn btn-secondary">View Bookings</a>
        <a href="movies.html" class="btn btn-primary">Book Another</a>
      </div>
    </div>

    <canvas id="confettiCanvas"
      style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;"></canvas>
  </main>

  <script src="script.js"></script>
</body>

</html>
