<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineBook - Movie Ticket Booking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <!-- Video Background -->
    <video class="video-bg" autoplay loop muted playsinline>
      <source src="images/bg.mp4.mp4" type="video/mp4">
    </video>
    <!-- Dark Overlay -->
    <div class="video-overlay"></div>
    
    <div class="auth-container slide-up">
      <div class="auth-header">
        <div class="auth-logo">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
          <span>CineBook</span>
        </div>
        <h1 class="auth-title" id="authTitle">Welcome Back</h1>
        <p class="auth-subtitle" id="authSubtitle">Sign in to book your favorite movies</p>
      </div>

      <form class="auth-form" id="authForm">
        <div class="form-group" id="nameGroup" style="display: none;">
          <label class="form-label" for="name">Full Name</label>
          <input type="text" class="form-input" id="name" placeholder="Enter your full name">
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
        </div>

        <div class="remember-forgot" id="rememberForgot" style="display: flex;">
          <label class="remember-me">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="authBtn">
          Sign In
        </button>
      </form>

      <p class="auth-toggle">
        <span id="toggleText">Don't have an account?</span>
        <a href="#" id="toggleAuth">Sign Up</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
