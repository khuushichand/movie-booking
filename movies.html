<!-- movies.html - Movie browsing and selection page -->
<!-- Purpose: Displays available movies with search/filter functionality, allows users to select movies for booking -->
<!-- Features: Dynamic movie grid, search by title, filter by genre/language, responsive design -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies - PixieSpark</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Global video background that changes based on theme -->
  <div class="global-video-bg">
    <video autoplay muted loop playsinline id="themeVideo">
      <source src="images/light.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
  </div>
  <!-- Navigation bar with PixieSpark branding -->
  <nav class="navbar">
    <a href="movies.html" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z" />
      </svg>
      <span>PixieSpark</span>
    </a>

    <!-- Main navigation links -->
    <div class="navbar-nav">
      <a href="movies.html" class="nav-link active">Movies</a>
      <a href="dashboard.html" class="nav-link">My Bookings</a>
    </div>

    <!-- Right side navbar controls -->
    <div class="navbar-right">
      <!-- Theme toggle button (sun/moon icons) -->
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg class="sun-icon" viewBox="0 0 24 24">
          <path
            d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z" />
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" style="display: none;">
          <path
            d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z" />
        </svg>
      </button>

      <!-- User profile dropdown menu -->
      <div class="profile-container">
        <button class="profile-btn" id="profileBtn">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
          </svg>
        </button>
        <div class="profile-dropdown" id="profileDropdown">
          <a href="dashboard.html" class="dropdown-item">
            <svg viewBox="0 0 24 24">
              <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
            </svg>
            <span>Dashboard</span>
          </a>
          <a href="dashboard.html" class="dropdown-item">
            <svg viewBox="0 0 24 24">
              <path
                d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" />
            </svg>
            <span>My Bookings</span>
          </a>
          <div class="dropdown-divider"></div>
          <a href="index.html" class="dropdown-item" id="logoutBtn">
            <svg viewBox="0 0 24 24">
              <path
                d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
            </svg>
            <span>Logout</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main content area for movies page -->
  <main class="movies-page">
    <!-- Page header with title and subtitle -->
    <div class="movies-header">
      <h1 class="movies-title">Now Showing</h1>
      <p class="movies-subtitle">Book your tickets for the latest movies</p>
    </div>

    <!-- Search and filter controls -->
    <div class="search-filter-container">
      <!-- Search input with magnifying glass icon -->
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" placeholder="Search movies by title...">
      </div>
      <!-- Filter dropdowns for genre and language -->
      <div class="filter-group">
        <select id="genreFilter" class="filter-dropdown">
          <option value="all">All Genres</option>
        </select>
        <select id="langFilter" class="filter-dropdown">
          <option value="all">All Languages</option>
        </select>
      </div>
    </div>

    <!-- Movies display container -->
    <div class="movies-container">
      <!-- Grid layout for movie cards - populated dynamically by JavaScript -->
      <div class="movies-grid" id="moviesGrid">
        <!-- Movies will be populated by JavaScript -->
      </div>
    </div>
  </main>

  <!-- Load main JavaScript file for movie functionality -->
  <script src="script.js"></script>
</body>

</html>
